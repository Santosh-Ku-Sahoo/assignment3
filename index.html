<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Greeting Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="greeting">Hello</h1>

        <div class="boxes">
            <div class="box" onclick="changeColor(this, 'red')">Red</div>
            <div class="box" onclick="changeColor(this, 'blue')">Blue</div>
            <div class="box" onclick="changeColor(this, 'green')">Green</div>
            <div class="box" onclick="changeColor(this, 'yellow')">Yellow</div>
        </div>

        <input type="text" id="nameInput" placeholder="Enter your name">
        <button onclick="greetUser()">Greet Me</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
